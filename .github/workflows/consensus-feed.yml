name: consensus-feed

# TIER 2: live loop. Triggered every 5 min by cron-job.org via workflow_dispatch
# (GitHub's own schedule throttles to every few hours, so it's removed).
on:
  workflow_dispatch:

permissions:
  contents: write             # to persist alerts_log.jsonl + state

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run consensus check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 build_feed.py
      - name: Persist log + state
        run: |
          git config user.name "consensus-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f alerts_log.jsonl seen_consensus2.json 2>/dev/null || true
          git commit -m "log update" || echo "no change"
          git pull --rebase --autostash || true
          git push || echo "push skipped"
