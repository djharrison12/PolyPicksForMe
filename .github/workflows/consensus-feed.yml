name: consensus-feed

# Runs the cohort/consensus pipeline on a schedule, writes results.json,
# pushes new hits to Telegram, and publishes the dashboard + feed to GitHub Pages.
on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (GitHub's minimum is 5)
  workflow_dispatch:          # lets you run it on demand from the Actions tab

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Build feed + push alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p public
          cp dashboard.html public/index.html
          python3 build_feed.py --out public/results.json
          cp seen_consensus2.json public/.state.json 2>/dev/null || true

      - name: Commit feed
        run: |
          git config user.name "consensus-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f public/results.json seen_consensus2.json || true
          git commit -m "feed update" || echo "nothing to commit"
          git push || echo "nothing to push"

      - name: Publish to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
