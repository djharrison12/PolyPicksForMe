name: consensus-feed

# Lean version: just runs the script and lets Telegram be the output.
# No committing files, no Pages — nothing that needs write access or can fail silently.
on:
  schedule:
    - cron: "*/10 * * * *"   # background checks every 10 min (real picks only)
  workflow_dispatch:          # you clicking "Run workflow" also texts a diagnostic

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run consensus check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 build_feed.py
