name: crossmarket-logger

on:
  schedule:
    # every 30 min, only during MLB game hours (~16:00-05:00 UTC = noon-1am ET)
    # ~26 SGO calls/day ≈ 780/month — fits a free-tier quota with headroom for probes
    - cron: "*/30 16-23 * * *"
    - cron: "*/30 0-4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "run | --probe | --pmprobe | --analyze"
        default: "run"
        type: choice
        options: ["run", "--probe", "--pmprobe", "--analyze"]

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          ARG="${{ github.event.inputs.mode }}"
          [ "$ARG" = "run" ] || [ -z "$ARG" ] && ARG=""
          python crossmarket_logger.py $ARG

      - name: Commit log back to repo
        run: |
          git config user.name  "crossmarket-bot"
          git config user.email "actions@github.com"
          git pull --rebase || true
          git add crossmarket_log.jsonl 2>/dev/null || true
          git diff --staged --quiet || git commit -m "crossmarket snapshot $(date -u +%FT%TZ)"
          git push || true
