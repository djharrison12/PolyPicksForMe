name: backtest
on:
  workflow_dispatch:
    inputs:
      start:
        description: "start date YYYY-MM-DD"
        default: "2025-12-01"
      end:
        description: "end date YYYY-MM-DD (blank = today)"
        default: "2026-03-31"
      top:
        description: "top-N cohort by weight"
        default: "200"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run backtest
        run: python3 backtest.py --start ${{ github.event.inputs.start }} --end ${{ github.event.inputs.end }} --top ${{ github.event.inputs.top }}
      - name: Save results
        run: |
          git config user.name "backtest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f backtest_results.json
          git commit -m "backtest run" || echo "no change"
          git pull --rebase --autostash || true
          git push || echo "push skipped"
