name: backtest
on:
  workflow_dispatch:
    inputs:
      start:
        description: "start date YYYY-MM-DD"
        default: "2026-02-01"
      end:
        description: "end date YYYY-MM-DD (blank = today)"
        default: "2026-06-01"
      top:
        description: "top-N cohort by weight"
        default: "200"
      threshold:
        description: "min traders for consensus (5 = default, 4 = looser)"
        default: "5"
      mode:
        description: "mode: normal | trader_report | persistence | favorite_report"
        default: "normal"
      min_bets:
        description: "min bets per trader (for trader_report / persistence)"
        default: "15"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - name: Run backtest
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.mode }}" = "trader_report" ]; then
            FLAGS="--trader-report --min-bets ${{ github.event.inputs.min_bets }}"
          elif [ "${{ github.event.inputs.mode }}" = "persistence" ]; then
            FLAGS="--persistence --min-bets ${{ github.event.inputs.min_bets }}"
          elif [ "${{ github.event.inputs.mode }}" = "favorite_report" ]; then
            FLAGS="--favorite-report"
          fi
          python3 backtest.py \
            --start ${{ github.event.inputs.start }} \
            --end ${{ github.event.inputs.end }} \
            --top ${{ github.event.inputs.top }} \
            --threshold ${{ github.event.inputs.threshold }} \
            $FLAGS
      - name: Save results
        run: |
          git config user.name "backtest-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -f backtest_results.json
          git commit -m "backtest run" || echo "no change"
          git pull --rebase --autostash || true
          git push || echo "push skipped"
